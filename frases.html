<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frases - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✏️ Frases da Yoyo</h1>
            <p>Monte a frase com as palavras em ordem!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="word-area">
                <div class="emoji" id="emoji">🐱</div>
                <div class="sentence-slots" id="sentence-slots"></div>
            </div>

            <div class="words" id="words"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir frase</button>
                <button class="btn-next" id="btn-next">Próxima ➜</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="frases.js"></script>
</body>
</html>
