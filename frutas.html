<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutas e Vegetais - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍎 Frutas e Vegetais</h1>
            <p>Clique no nome certo!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">Início</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="word-area">
                <div class="animal-word" id="fruta-emoji">🍎</div>
                <div class="animal-hint" id="fruta-hint">Qual é essa fruta?</div>
            </div>

            <div class="animals" id="opcoes"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir</button>
                <button class="btn-next" id="btn-next">Próxima 🚀</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="admin.js"></script>
    <script src="frutas.js"></script>
    <script src="tts.js"></script>
</body>
</html>
