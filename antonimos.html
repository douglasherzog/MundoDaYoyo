<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Opostos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>Opostos</h1>
            <div class="stars-counter">
                <span class="star-icon">?</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div class="opposite-question">
                <p>Encontre o oposto:</p>
                <div id="target-word" class="target-word"></div>
            </div>

            <div id="options-area" class="opposite-options"></div>

            <div id="feedback" class="feedback"></div>

            <button id="btn-next" class="btn-next" disabled>Próxima ??</button>
        </main>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>`n    <script src="yoyo-mascot.js"></script>
    <script src="antonimos.js"></script>
    <script src="tts.js"></script>
    <script src="admin.js"></script>
</body>
</html>
