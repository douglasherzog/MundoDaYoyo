<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opostos - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Opostos</h1>
            <p>Encontre palavras opostas!</p>
        </header>
        <main class="game-area">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="opposite-question">
                <p>Encontre o oposto:</p>
                <div id="target-word" class="target-word"></div>
            </div>
            <div id="options-area" class="opposite-options"></div>
            <div id="feedback" class="feedback"></div>
            <div class="controls">
                <button class="btn-speak" id="btn-speak"> Ouvir pergunta</button>
            </div>
        </main>
        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
            <p>Herzog Developer</p>
        </footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="antonimos.js"></script>
    <script src="admin.js"></script>
</body>
</html>
