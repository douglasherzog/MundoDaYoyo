<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça Bichinhos - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #arena {
            position: relative;
            width: 100%;
            height: 420px;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 80%, #7EC850 100%);
            border-radius: 20px;
            overflow: hidden;
            cursor: crosshair;
            border: 4px solid #5BB870;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            touch-action: none;
        }

        .bichinho {
            position: absolute;
            font-size: 2.4rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.3));
            touch-action: none;
        }

        .bichinho:hover { transform: scale(1.2); }

        .pontos-popup {
            position: absolute;
            font-size: 1.4rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
            pointer-events: none;
            animation: subirSumindo 0.8s forwards;
            z-index: 99;
        }

        @keyframes subirSumindo {
            0%   { opacity: 1; transform: translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(135deg, #FF6B9D, #FF8C42);
            border-radius: 16px;
            margin-bottom: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(255,107,157,0.4);
        }

        #hud span { font-size: 1rem; }

        #timer-bar-wrap {
            width: 100%;
            height: 14px;
            background: #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            background: linear-gradient(90deg, #5BB870, #FF6B9D);
            border-radius: 8px;
            transition: width 1s linear;
            width: 100%;
        }

        #resultado {
            display: none;
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            margin-top: 10px;
        }

        #resultado h2 { font-size: 2rem; color: #FF6B9D; margin-bottom: 8px; }
        #resultado .pontos-finais { font-size: 3rem; font-weight: bold; color: #FF8C42; }
        #resultado .estrelas { font-size: 2.5rem; margin: 10px 0; }

        #btn-reiniciar {
            margin-top: 16px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #FF6B9D, #FF8C42);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(255,107,157,0.4);
            transition: transform 0.15s;
        }

        #btn-reiniciar:hover { transform: scale(1.07); }

        .legenda-bichinhos {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #666;
        }

        .legenda-item {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦋 Caça Bichinhos!</h1>
            <p>Clique nos bichinhos antes que fujam!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">Início</a>

            <div class="legenda-bichinhos">
                <div class="legenda-item">🐛 +5</div>
                <div class="legenda-item">🦋 +10</div>
                <div class="legenda-item">🐝 +15</div>
                <div class="legenda-item">🐦 +20</div>
                <div class="legenda-item">🪲 +25</div>
            </div>

            <div id="hud">
                <div>⭐ <span id="placar">0</span> pontos</div>
                <div>🕐 <span id="tempo">2:00</span></div>
                <div>🎯 <span id="acertos">0</span> acertos</div>
            </div>

            <div id="timer-bar-wrap">
                <div id="timer-bar"></div>
            </div>

            <div id="arena"></div>

            <div id="resultado">
                <h2>🎉 Tempo esgotado!</h2>
                <div class="estrelas" id="estrelas-resultado"></div>
                <div>Você fez</div>
                <div class="pontos-finais" id="pontos-finais">0</div>
                <div>pontos em <span id="acertos-finais">0</span> acertos!</div>
                <button id="btn-reiniciar">🔄 Jogar de novo!</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="admin.js"></script>
    <script src="tts.js"></script>
    <script src="bichinhos.js"></script>
</body>
</html>
