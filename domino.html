<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Dominó</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .domino-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
        }

        .domino-nivel-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.4rem;
            font-weight: bold;
            color: #6a1b9a;
            background: linear-gradient(135deg, #fff3e0, #fce4ec);
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .domino-nivel-bar .nivel-num {
            background: #7b1fa2;
            color: #fff;
            border-radius: 50%;
            width: 2.2rem;
            height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .domino-tabuleiro-area {
            width: 100%;
            min-height: 200px;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            overflow-x: auto;
        }

        .domino-chain {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2px;
            max-width: 100%;
        }

        .domino-peca {
            display: flex;
            align-items: stretch;
            background: linear-gradient(135deg, #fff8e7, #f5e6c8);
            border: 3px solid #d4c4a0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        .domino-peca.tabuleiro-peca {
            width: 120px;
            min-height: 60px;
            animation: slideIn 0.4s ease-out;
        }

        .domino-peca.mao-peca {
            width: 100px;
            min-height: 50px;
        }

        .domino-peca.mao-peca:hover {
            transform: translateY(-6px) scale(1.05);
        }

        .domino-peca.valida {
            animation: pulseValid 1.2s ease-in-out infinite;
            border-color: #ffc107;
        }

        .domino-peca.invalida-tentativa {
            animation: shake 0.4s ease-in-out;
        }

        .domino-peca.colocada {
            animation: bounceIn 0.5s ease-out;
        }

        .domino-metade {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            line-height: 1;
            padding: 0.3rem;
        }

        .domino-peca.tabuleiro-peca .domino-metade {
            font-size: 2.5rem;
        }

        .domino-divisor {
            width: 3px;
            background: #d4c4a0;
            margin: 4px 0;
            border-radius: 2px;
        }

        .domino-metade svg {
            width: 80%;
            height: 80%;
        }

        .domino-end-glow-left {
            box-shadow: -4px 0 12px 2px rgba(76,175,80,0.6);
            border-radius: 10px 0 0 10px;
        }

        .domino-end-glow-right {
            box-shadow: 4px 0 12px 2px rgba(76,175,80,0.6);
            border-radius: 0 10px 10px 0;
        }

        .domino-mao-area {
            width: 100%;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .domino-mao-titulo {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1565c0;
        }

        .domino-mao-pecas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            min-height: 60px;
        }

        .domino-feedback {
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            min-height: 2.5rem;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .domino-feedback.success {
            color: #2e7d32;
            background: rgba(165,214,167,0.5);
        }

        .domino-feedback.error {
            color: #c62828;
            background: rgba(255,205,210,0.5);
        }

        .domino-botoes {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .domino-btn {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .domino-btn:hover {
            transform: scale(1.05);
        }

        .domino-btn:active {
            transform: scale(0.95);
        }

        .domino-btn-dica {
            background: linear-gradient(135deg, #fff9c4, #fff176);
            color: #f57f17;
        }

        .domino-btn-proximo {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            color: #fff;
        }

        .domino-btn-jogar {
            background: linear-gradient(135deg, #ce93d8, #ab47bc);
            color: #fff;
            font-size: 1.8rem;
            padding: 1rem 3rem;
        }

        .domino-tela-inicio {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            text-align: center;
        }

        .domino-tela-inicio h2 {
            font-size: 2.5rem;
            color: #7b1fa2;
        }

        .domino-tela-inicio p {
            font-size: 1.4rem;
            color: #555;
        }

        .domino-tela-inicio .domino-demo {
            display: flex;
            gap: 4px;
            margin: 1rem 0;
        }

        .domino-celebracao {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 1rem;
        }

        .domino-celebracao.show {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .domino-celebracao-conteudo {
            background: linear-gradient(135deg, #fffde7, #fff9c4);
            border-radius: 30px;
            padding: 2rem 3rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: bounceIn 0.5s;
        }

        .domino-celebracao-conteudo h2 {
            font-size: 2.5rem;
            color: #f57f17;
        }

        .domino-celebracao-conteudo p {
            font-size: 1.4rem;
            color: #555;
        }

        .confetti-piece {
            position: fixed;
            font-size: 2rem;
            animation: confettiFall 3s linear forwards;
            z-index: 101;
            pointer-events: none;
        }

        @keyframes slideIn {
            from { transform: scale(0.5) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulseValid {
            0%, 100% { box-shadow: 0 4px 8px rgba(0,0,0,0.2), 0 0 0 0 rgba(255,193,7,0.7); border-color: #ffc107; }
            50% { box-shadow: 0 4px 8px rgba(0,0,0,0.2), 0 0 20px 6px rgba(255,193,7,0.6); border-color: #ff8f00; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .domino-peca.tabuleiro-peca { width: 90px; min-height: 45px; }
            .domino-peca.tabuleiro-peca .domino-metade { font-size: 1.8rem; }
            .domino-peca.mao-peca { width: 80px; min-height: 40px; }
            .domino-metade { font-size: 1.6rem; }
            .domino-nivel-bar { font-size: 1.1rem; }
        }
    </style>
</head>
<body class="game-page">
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>🁢 Dominó</h1>
            <div class="stars-counter">
                <span class="star-icon">⭐</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div id="tela-inicio" class="domino-tela-inicio">
                <h2>🁢 Vamos jogar Dominó! 🁢</h2>
                <p>Encaixa as peças que combinam!</p>
                <div class="domino-demo">
                    <div class="domino-peca tabuleiro-peca" style="cursor:default">
                        <div class="domino-metade">🐶</div>
                        <div class="domino-divisor"></div>
                        <div class="domino-metade">🐱</div>
                    </div>
                    <div class="domino-peca tabuleiro-peca" style="cursor:default">
                        <div class="domino-metade">🐱</div>
                        <div class="domino-divisor"></div>
                        <div class="domino-metade">🐰</div>
                    </div>
                </div>
                <p>👆 As peças que brilham podem ser encaixadas!</p>
                <button id="btn-jogar" class="domino-btn domino-btn-jogar">Jogar! 🎮</button>
            </div>

            <div id="tela-jogo" class="domino-game" style="display:none">
                <div id="nivel-bar" class="domino-nivel-bar"></div>
                <div class="domino-tabuleiro-area">
                    <div id="domino-chain" class="domino-chain"></div>
                </div>
                <div id="domino-feedback" class="domino-feedback"></div>
                <div class="domino-mao-area">
                    <div class="domino-mao-titulo">🤲 Suas peças</div>
                    <div id="domino-mao" class="domino-mao-pecas"></div>
                </div>
                <div class="domino-botoes">
                    <button id="btn-dica" class="domino-btn domino-btn-dica">Dica 💡</button>
                    <button id="btn-proximo" class="domino-btn domino-btn-proximo" style="display:none">Próximo Nível 🚀</button>
                </div>
            </div>

            <div id="celebracao" class="domino-celebracao">
                <div class="domino-celebracao-conteudo">
                    <h2 id="celebracao-titulo">🎉 Parabéns! 🎉</h2>
                    <p id="celebracao-texto">Você encaixou todas as peças!</p>
                    <button id="btn-continuar" class="domino-btn domino-btn-proximo">Continuar 🚀</button>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>Feito com ❤️ para a Yoyo</p>
        <p>✝️ Herzog Developer</p>
    </footer>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="domino.js"></script>
    <script src="admin.js"></script>
</body>
</html>
