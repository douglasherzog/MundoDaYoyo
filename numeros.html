<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Números da Yoyo</h1>
            <p>Conte os objetos e clique no número certo!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="count-area">
                <div class="objects" id="objects"></div>
                <div class="question">Quantos objetos você vê?</div>
            </div>

            <div class="numbers" id="numbers"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir número</button>
                <button class="btn-next" id="btn-next">Próxima ➜</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="numeros.js"></script>
</body>
</html>
