<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande ou Pequeno - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Grande ou Pequeno?</h1>
            <p>Compare tamanhos e descubra o maior!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="word-area">
                <div id="tamanho-cena" style="font-size:3rem; line-height:1.6; margin:10px 0 5px"></div>
                <div class="animal-hint" id="tamanho-hint">Qual é maior?</div>
            </div>
            <div class="animals" id="opcoes"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button class="btn-speak" id="btn-speak"> Ouvir pergunta</button>
            </div>
        </main>
        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
            <p> Herzog Developer</p>
        </footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="tamanhos.js"></script>
    <script src="admin.js"></script>
</body>
</html>
