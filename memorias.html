<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memória - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Memória da Yoyo</h1>
            <p>Vire duas cartas e encontre os pares iguais!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="attempts">Tentativas: <span id="tentativas">0</span></div>
            <div class="memory-grid" id="memory-grid"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button class="btn-next" id="btn-restart"> Jogar de novo</button>
            </div>
        </main>
        <footer><p>Feito com  para a Yoyo</p></footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="memorias.js"></script>
    <script src="admin.js"></script>
</body>
</html>
