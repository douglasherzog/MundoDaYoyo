<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formar Números - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Formar Números</h1>
            <p>Clique nos algarismos para formar números e ouvir!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>

            <div class="number-display" id="number-display">0</div>
            <div class="number-words" id="number-words">zero</div>

            <div class="digit-keyboard" id="digit-keyboard"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir número</button>
                <button class="btn-clear" id="btn-clear">🗑️ Limpar</button>
                <button class="btn-next" id="btn-next">✨ Surpresa</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="admin.js"></script>
    <script src="formar-numeros.js"></script>
</body>
</html>
