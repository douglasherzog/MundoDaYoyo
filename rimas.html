<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimas - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Rimas da Yoyo</h1>
            <p>Descubra palavras que rimam!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="word-area">
                <div class="rhyme-target" id="rhyme-target"></div>
                <div class="rhyme-word" id="rhyme-word">Bola</div>
                <div class="rhyme-question" id="rhyme-question">Rima com qual palavra?</div>
            </div>
            <div class="rhymes" id="rhymes"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button class="btn-speak" id="btn-speak"> Ouvir de novo</button>
            </div>
        </main>
        <footer><p>Feito com  para a Yoyo</p></footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="rimas.js"></script>
    <script src="admin.js"></script>
</body>
</html>
