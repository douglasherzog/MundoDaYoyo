<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Meu Corpo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button"> Início</a>
            <h1> Meu Corpo</h1>
            <div class="stars-counter">
                <span class="star-icon"></span>
                <span id="stars-count">0</span>
            </div>
        </header>
        <main class="game-area">
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="body-instruction">
                <p>Clique na parte do corpo indicada:</p>
                <div id="target-body-part" class="target-body-part"></div>
            </div>
            <div class="body-container">
                <div class="body-figure">
                    <div class="body-head" data-part="cabeça"></div>
                    <div class="body-torso" data-part="peito"></div>
                    <div class="body-arm left" data-part="braço"></div>
                    <div class="body-arm right" data-part="braço"></div>
                    <div class="body-leg left" data-part="perna"></div>
                    <div class="body-leg right" data-part="perna"></div>
                </div>
            </div>
            <div id="feedback" class="feedback"></div>
        </main>
        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
            <p> Herzog Developer</p>
        </footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="corpo.js"></script>
    <script src="admin.js"></script>
</body>
</html>
