<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Mágico - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🦄 Mundo Mágico da Yoyo 🌈</h1>
            <p>Descubra as palavras mágicas de unicórnios, arco-íris e marshmallows!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="word-area">
                <div class="emoji" id="emoji">🦄</div>
                <div class="target-slots" id="target-slots"></div>
            </div>

            <div class="syllables" id="syllables"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir palavra mágica</button>
                <button class="btn-next" id="btn-next">Próxima ➜</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ e magia para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="admin.js"></script>
    <script src="magical.js"></script>
    <script src="tts.js"></script>
</body>
</html>
