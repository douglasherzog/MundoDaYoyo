<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto da Yoyo - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔤 Alfabeto da Yoyo</h1>
            <p>Clique nas letras para formar palavras e ouvir!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>

            <div class="letter-display" id="letter-display">?</div>
            <div class="word-slots" id="word-slots"></div>

            <div class="letter-keyboard" id="letter-keyboard"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir</button>
                <button class="btn-clear" id="btn-clear">🗑️ Limpar</button>
                <button class="btn-next" id="btn-next">✨ Palavra mágica</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="alfabeto.js"></script>
</body>
</html>
