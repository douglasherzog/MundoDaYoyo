<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formar Palavras - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Formar Palavras</h1>
            <p>Monte a palavra letra por letra!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="word-area">
                <div class="word-image" id="word-image"></div>
                <div class="word-slots" id="word-slots"></div>
                <div class="word-tip" id="word-tip">Clique nas letras na ordem certa</div>
            </div>
            <div class="word-keyboard" id="keyboard"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button class="btn-clear" id="btn-clear"> Limpar</button>
                <button class="btn-speak" id="btn-speak"> Ouvir palavra</button>
            </div>
        </main>
        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
            <p>✝️ Herzog Developer</p>
        </footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="palavras.js"></script>
    <script src="admin.js"></script>
</body>
</html>
