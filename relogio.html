<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Que horas são?</h1>
            <p>Leia o relógio e escolha a hora certa!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="clock-container">
                <div class="clock-face">
                    <div class="clock-hand hour-hand" id="hour-hand"></div>
                    <div class="clock-hand minute-hand" id="minute-hand"></div>
                    <div class="clock-center"></div>
                </div>
            </div>
            <div id="options-area" class="clock-options"></div>
            <div id="feedback" class="feedback"></div>
            <div class="controls">
                <button class="btn-speak" id="btn-speak"> Ouvir de novo</button>
            </div>
        </main>
        <footer><p>Feito com  para a Yoyo</p></footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="relogio.js"></script>
    <script src="admin.js"></script>
</body>
</html>
