<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letra Inicial - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔤 Letra Inicial</h1>
            <p>Qual letra a palavra começa?</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">← Voltar ao menu</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="word-area">
                <div class="letter-word" id="letter-word">🍎</div>
                <div class="letter-name" id="letter-name">maçã</div>
                <div class="letter-question" id="letter-question">Começa com qual letra?</div>
            </div>

            <div class="letters" id="letters"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir palavra</button>
                <button class="btn-next" id="btn-next">Próxima ➜</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="sounds.js"></script>
    <script src="letra-inicial.js"></script>
</body>
</html>
