<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Vestir Boneco</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #dress-screen { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .select-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .select-screen h2 {
            font-size: 2rem;
            color: #6a1b9a;
            margin-bottom: 24px;
        }
        .char-options {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .char-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 32px;
            border: 4px solid #e0e0e0;
            border-radius: 24px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
        }
        .char-btn:hover, .char-btn:active {
            border-color: #ab47bc;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(171,71,188,0.3);
        }
        .char-emoji { font-size: 5rem; line-height: 1; }

        .doll-wrapper {
            position: relative;
            width: 280px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 20px;
            border: 4px solid #ffcc80;
            overflow: hidden;
        }
        .doll-wrapper.bg-quarto { background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%); border-color: #f48fb1; }
        .doll-wrapper.bg-jardim { background: linear-gradient(180deg, #c8e6c9 0%, #81c784 100%); border-color: #66bb6a; }
        .doll-wrapper.bg-praia { background: linear-gradient(180deg, #b3e5fc 0%, #fff9c4 100%); border-color: #4fc3f7; }
        .doll-wrapper.bg-palco { background: linear-gradient(180deg, #1a237e 0%, #311b92 100%); border-color: #ffd700; }

        #doll { width: 200px; height: 420px; }
        .sparkle {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: sparkleAnim 0.8s ease-out forwards;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        .bg-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }
        .bg-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 3px solid #ddd;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .bg-btn:hover { border-color: #ab47bc; transform: scale(1.1); }
        .bg-btn.active { border-color: #ab47bc; box-shadow: 0 0 8px rgba(171,71,188,0.5); }

        .category-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .cat-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 60px;
        }
        .cat-tab:hover { border-color: #ce93d8; }
        .cat-tab.active {
            border-color: #ab47bc;
            background: #f3e5f5;
            box-shadow: 0 3px 10px rgba(171,71,188,0.2);
        }
        .cat-tab .cat-icon { font-size: 1.8rem; }
        .cat-tab .cat-label { font-size: 0.7rem; color: #666; margin-top: 2px; }

        .options-panel {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 12px;
            min-height: 80px;
            max-width: 600px;
        }
        .opt-btn {
            width: 64px; height: 64px;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.2s;
            position: relative;
        }
        .opt-btn:hover { border-color: #ce93d8; transform: scale(1.05); }
        .opt-btn.active {
            border-color: #ab47bc;
            background: #f3e5f5;
            box-shadow: 0 3px 10px rgba(171,71,188,0.3);
        }
        .opt-btn .opt-check {
            position: absolute;
            top: -6px; right: -6px;
            background: #ab47bc;
            color: white;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 0.7rem;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .opt-btn.active .opt-check { display: flex; }

        .color-palette {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 8px 12px;
        }
        .color-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 3px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover { transform: scale(1.15); }
        .color-btn.active {
            border-color: #333;
            border-width: 4px;
            box-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        .btn-finish {
            padding: 12px 32px;
            font-size: 1.3rem;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-weight: bold;
        }
        .btn-finish:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(123,31,162,0.4); }

        .celebration-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .celebration-content {
            background: linear-gradient(180deg, #fff3e0, #fce4ec);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 360px;
            position: relative;
        }
        .celebration-content h2 {
            font-size: 2rem;
            color: #6a1b9a;
            margin-bottom: 16px;
        }
        #final-doll svg { width: 180px; height: 380px; }
        .confetti {
            position: fixed;
            width: 12px; height: 12px;
            pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        @media (max-width: 600px) {
            .doll-wrapper { width: 240px; height: 360px; }
            #doll { width: 170px; height: 360px; }
            .char-emoji { font-size: 4rem; }
            .opt-btn { width: 56px; height: 56px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>Vestir Boneco 👗</h1>
            <div class="stars-counter">
                <span class="star-icon">⭐</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div id="select-screen" class="select-screen">
                <h2>Escolha seu boneco! 🧸</h2>
                <div class="char-options">
                    <button class="char-btn" data-genero="menina">
                        <span class="char-emoji">👧</span>
                        <span>Menina</span>
                    </button>
                    <button class="char-btn" data-genero="menino">
                        <span class="char-emoji">👦</span>
                        <span>Menino</span>
                    </button>
                </div>
            </div>

            <div id="dress-screen" style="display:none;">
                <div class="doll-wrapper" id="doll-wrapper">
                    <svg id="doll" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>

                <div class="bg-selector" id="bg-selector">
                    <button class="bg-btn active" data-bg="quarto" title="Quarto">🛏️</button>
                    <button class="bg-btn" data-bg="jardim" title="Jardim">🌸</button>
                    <button class="bg-btn" data-bg="praia" title="Praia">🏖️</button>
                    <button class="bg-btn" data-bg="palco" title="Palco">🎭</button>
                </div>

                <div class="category-tabs" id="category-tabs"></div>
                <div class="options-panel" id="options-panel"></div>
                <div class="color-palette" id="color-palette" style="display:none;"></div>

                <button class="btn-finish" id="btn-finish">Terminei! 🎉</button>
            </div>
        </main>
    </div>

    <div id="celebration" class="celebration-overlay" style="display:none;">
        <div class="celebration-content">
            <h2 id="celeb-title">Que lindo! 🌟</h2>
            <div id="final-doll"></div>
            <button class="btn-finish" id="btn-restart">Brincar de novo 🔄</button>
        </div>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="tts.js"></script>
    <script src="admin.js"></script>
    <script src="vestir.js"></script>
</body>
</html>
