<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Vestir Boneco</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ====== SELEÇÃO DE PERSONAGEM ====== */
        .select-screen { text-align: center; padding: 30px 20px; }
        .select-screen h2 {
            font-size: 2.2rem; color: #6a1b9a; margin-bottom: 28px;
            text-shadow: 1px 2px 4px rgba(171,71,188,0.15);
        }
        .char-options { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
        .char-btn {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 28px 40px; border: 4px solid #e8e0ec; border-radius: 28px;
            background: linear-gradient(160deg, #fff, #faf3fc); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 1.5rem; font-weight: bold; color: #4a148c;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        .char-btn:hover, .char-btn:active {
            border-color: #ab47bc; transform: scale(1.08) translateY(-4px);
            box-shadow: 0 10px 30px rgba(171,71,188,0.25);
        }
        .char-emoji { font-size: 5.5rem; line-height: 1; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }

        /* ====== SELEÇÃO DE OCASIÃO ====== */
        #occasion-screen { text-align: center; padding: 20px; }
        #occasion-screen h2 { font-size: 1.8rem; color: #6a1b9a; margin-bottom: 20px; }
        #occasion-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px; max-width: 700px; margin: 0 auto;
        }
        .occasion-card {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 20px 12px; border: 4px solid #e8e0ec; border-radius: 20px;
            background: linear-gradient(160deg, #fff, #faf5fc); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.95rem; font-weight: bold; color: #4a148c;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        .occasion-card:hover, .occasion-card:active {
            border-color: #ab47bc; transform: scale(1.06) translateY(-3px);
            box-shadow: 0 8px 25px rgba(171,71,188,0.25);
        }
        .occ-emoji { font-size: 3rem; line-height: 1; }

        /* ====== LAYOUT 3 COLUNAS ====== */
        #dress-screen {
            display: flex; flex-direction: row; align-items: flex-start;
            justify-content: center; gap: 12px; max-width: 100%;
        }
        .side-panel { display: flex; flex-direction: column; gap: 8px; width: 210px; flex-shrink: 0; }
        .center-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        /* ====== INDICADOR DE ETAPA ====== */
        #step-indicator {
            text-align: center; padding: 8px 16px;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            border-radius: 16px; border: 2px solid #ce93d8; min-width: 240px;
        }
        #step-title { font-size: 1.3rem; font-weight: bold; color: #4a148c; margin-bottom: 4px; }
        #step-hint { font-size: 0.9rem; color: #6a1b9a; margin-bottom: 6px; }
        #progress-dots { display: flex; gap: 6px; justify-content: center; }
        .dot {
            width: 26px; height: 26px; border-radius: 50%; border: 2px solid #ce93d8;
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; color: #9c27b0; transition: all 0.3s;
        }
        .dot.active { background: #ab47bc; color: #fff; border-color: #7b1fa2; transform: scale(1.2); box-shadow: 0 0 10px rgba(171,71,188,0.5); }
        .dot.done { background: #66bb6a; color: #fff; border-color: #2e7d32; }

        /* ====== DOLL ====== */
        .doll-wrapper {
            position: relative; width: 280px; height: 460px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%);
            border-radius: 24px; border: 5px solid #f48fb1; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12), inset 0 0 60px rgba(255,255,255,0.15);
        }
        .doll-wrapper.bg-quarto { background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%); border-color: #f48fb1; }
        .doll-wrapper.bg-jardim { background: linear-gradient(180deg, #c8e6c9 0%, #81c784 100%); border-color: #66bb6a; }
        .doll-wrapper.bg-praia { background: linear-gradient(180deg, #b3e5fc 0%, #fff9c4 100%); border-color: #4fc3f7; }
        .doll-wrapper.bg-palco { background: radial-gradient(ellipse at center top, #5c6bc0 0%, #1a237e 100%); border-color: #ffd700; }

        #doll {
            width: 240px; height: 460px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        /* Doll animations */
        #doll .doll-body { animation: breathe 3s ease-in-out infinite; transform-origin: 110px 250px; }
        #doll .doll-head { animation: sway 4s ease-in-out infinite; transform-origin: 110px 150px; }
        #doll .eyelid { animation: blink 4s ease-in-out infinite; transform-origin: center; }
        #doll .arm-left { animation: armWave 5s ease-in-out infinite; transform-origin: 60px 210px; }
        #doll .arm-right { animation: armWave2 5s ease-in-out infinite; transform-origin: 160px 210px; }

        @keyframes breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.02); } }
        @keyframes sway { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        @keyframes blink { 0%,90%,100% { transform: scaleY(0); } 93%,97% { transform: scaleY(1); } }
        @keyframes armWave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
        @keyframes armWave2 { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }

        /* Expression reaction animations */
        .doll-wrapper.expr-happy #doll { animation: happyBounce 0.6s ease-out; }
        .doll-wrapper.expr-sad #doll { animation: sadShake 0.5s ease-in-out; }
        .doll-wrapper.expr-happy .arm-left { animation: celebrateLeft 0.5s ease-out 2; }
        .doll-wrapper.expr-happy .arm-right { animation: celebrateRight 0.5s ease-out 2; }
        @keyframes happyBounce {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-12px) scale(1.03); }
            60% { transform: translateY(0) scale(1.01); }
            100% { transform: translateY(0) scale(1); }
        }
        @keyframes sadShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-6px) rotate(-1deg); }
            40% { transform: translateX(6px) rotate(1deg); }
            60% { transform: translateX(-4px) rotate(-0.5deg); }
            80% { transform: translateX(4px) rotate(0.5deg); }
        }
        @keyframes celebrateLeft {
            0%,100% { transform: rotate(0deg); }
            50% { transform: rotate(-25deg); }
        }
        @keyframes celebrateRight {
            0%,100% { transform: rotate(0deg); }
            50% { transform: rotate(25deg); }
        }

        .sparkle {
            position: absolute; font-size: 1.8rem; pointer-events: none;
            animation: sparkleAnim 0.8s ease-out forwards; z-index: 5;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.8) rotate(180deg); opacity: 0; }
        }

        /* ====== SELETOR DE CENÁRIO ====== */
        .bg-selector { display: flex; gap: 6px; justify-content: center; }
        .bg-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 3px solid #ddd;
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; background: #fff;
        }
        .bg-btn:hover { border-color: #ab47bc; transform: scale(1.15); }
        .bg-btn.active { border-color: #ab47bc; box-shadow: 0 0 10px rgba(171,71,188,0.5); }

        /* ====== OPÇÕES ====== */
        .options-panel {
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            padding: 8px; min-height: 70px; background: rgba(255,255,255,0.7);
            border-radius: 14px; border: 2px solid #e8e0ec;
        }
        .opt-btn {
            width: 60px; height: 60px; border: 3px solid #e0e0e0; border-radius: 14px;
            background: #fff; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; position: relative; padding: 2px;
        }
        .opt-btn:hover { border-color: #ce93d8; transform: scale(1.08); }
        .opt-btn.active {
            border-color: #66bb6a; background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
            box-shadow: 0 3px 12px rgba(102,187,106,0.4); transform: scale(1.05);
        }
        .opt-btn svg { width: 44px; height: 44px; }
        .opt-btn .opt-emoji { font-size: 2rem; line-height: 1; }
        .opt-btn .opt-check {
            position: absolute; top: -5px; right: -5px; background: #66bb6a;
            color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem;
            display: none; align-items: center; justify-content: center;
        }
        .opt-btn.active .opt-check { display: flex; }

        /* ====== PULSO DE DICA ====== */
        .hint-pulse {
            animation: hintPulse 1s ease-in-out infinite;
            border-color: #ffb74d !important; border-width: 4px !important;
            box-shadow: 0 0 12px rgba(255,183,77,0.6);
        }
        @keyframes hintPulse {
            0%,100% { transform: scale(1); box-shadow: 0 0 8px rgba(255,183,77,0.4); }
            50% { transform: scale(1.12); box-shadow: 0 0 20px rgba(255,183,77,0.8); }
        }

        /* ====== BOTÃO FINALIZAR ====== */
        .btn-finish {
            padding: 12px 36px; font-size: 1.3rem; border: none; border-radius: 22px;
            background: linear-gradient(135deg, #ab47bc, #7b1fa2); color: white;
            cursor: pointer; transition: all 0.2s; font-weight: bold;
            box-shadow: 0 4px 15px rgba(123,31,162,0.3);
        }
        .btn-finish:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(123,31,162,0.45); }

        /* ====== CELEBRAÇÃO ====== */
        .celebration-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65); display: flex; align-items: center;
            justify-content: center; z-index: 100; animation: fadeIn 0.5s;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .celebration-content {
            background: linear-gradient(180deg, #fff3e0, #fce4ec); border-radius: 28px;
            padding: 36px; text-align: center; max-width: 380px; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.5);
        }
        .celebration-content h2 {
            font-size: 1.8rem; color: #6a1b9a; margin-bottom: 16px;
            text-shadow: 1px 2px 4px rgba(171,71,188,0.15);
        }
        #final-doll svg { width: 200px; height: 400px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15)); }
        .confetti {
            position: fixed; width: 12px; height: 12px; pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ====== RESPONSIVO ====== */
        @media (max-width: 900px) {
            #dress-screen { flex-direction: column; align-items: center; gap: 8px; }
            .side-panel { width: 100%; max-width: 440px; }
            #occasion-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
        @media (max-width: 600px) {
            .doll-wrapper { width: 240px; height: 400px; }
            #doll { width: 200px; height: 400px; }
            .char-emoji { font-size: 4rem; }
            .opt-btn { width: 54px; height: 54px; }
            .opt-btn svg { width: 38px; height: 38px; }
            .side-panel { width: 100%; }
            #occasion-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>Vestir Boneco 👗</h1>
            <div class="stars-counter">
                <span class="star-icon">⭐</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div id="select-screen" class="select-screen">
                <h2>Escolha seu boneco! 🧸</h2>
                <div class="char-options">
                    <button class="char-btn" data-genero="menina">
                        <span class="char-emoji">👧</span>
                        <span>Menina</span>
                    </button>
                    <button class="char-btn" data-genero="menino">
                        <span class="char-emoji">👦</span>
                        <span>Menino</span>
                    </button>
                </div>
            </div>

            <div id="occasion-screen" style="display:none;">
                <h2>Para onde vamos? 🗺️</h2>
                <div id="occasion-grid"></div>
            </div>

            <div id="dress-screen" style="display:none;">
                <div class="side-panel" id="left-panel">
                    <div class="options-panel" id="left-options"></div>
                </div>

                <div class="center-panel">
                    <div id="step-indicator">
                        <div id="step-title">Cabeça 🧢</div>
                        <div id="step-hint">Escolha o que colocar na cabeça!</div>
                        <div id="progress-dots"></div>
                    </div>
                    <div class="doll-wrapper" id="doll-wrapper">
                        <svg id="doll" viewBox="0 0 220 460" xmlns="http://www.w3.org/2000/svg"></svg>
                    </div>
                    <div class="bg-selector" id="bg-selector">
                        <button class="bg-btn active" data-bg="quarto" title="Quarto">🛏️</button>
                        <button class="bg-btn" data-bg="jardim" title="Jardim">🌸</button>
                        <button class="bg-btn" data-bg="praia" title="Praia">🏖️</button>
                        <button class="bg-btn" data-bg="palco" title="Palco">🎭</button>
                    </div>
                </div>

                <div class="side-panel" id="right-panel">
                    <div class="options-panel" id="right-options"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="celebration" class="celebration-overlay" style="display:none;">
        <div class="celebration-content">
            <h2 id="celeb-title">Que lindo! 🌟</h2>
            <div id="final-doll"></div>
            <button class="btn-finish" id="btn-restart">Brincar de novo 🔄</button>
        </div>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="vestir-icons.js"></script>
    <script src="vestir.js"></script>
</body>
</html>
