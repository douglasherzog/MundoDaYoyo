<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Vestir Boneco</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ====== SELEÇÃO DE PERSONAGEM ====== */
        .select-screen {
            text-align: center;
            padding: 30px 20px;
        }
        .select-screen h2 {
            font-size: 2.2rem;
            color: #6a1b9a;
            margin-bottom: 28px;
            text-shadow: 1px 2px 4px rgba(171,71,188,0.15);
        }
        .char-options {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .char-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 28px 40px;
            border: 4px solid #e8e0ec;
            border-radius: 28px;
            background: linear-gradient(160deg, #fff, #faf3fc);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a148c;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }
        .char-btn:hover, .char-btn:active {
            border-color: #ab47bc;
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 10px 30px rgba(171,71,188,0.25);
        }
        .char-emoji { font-size: 5.5rem; line-height: 1; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }

        /* ====== LAYOUT 3 COLUNAS ====== */
        #dress-screen {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 12px;
            max-width: 100%;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 200px;
            flex-shrink: 0;
        }
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* ====== DOLL ====== */
        .doll-wrapper {
            position: relative;
            width: 260px;
            height: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%);
            border-radius: 24px;
            border: 5px solid #f48fb1;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12), inset 0 0 60px rgba(255,255,255,0.15);
        }
        .doll-wrapper.bg-quarto { background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 100%); border-color: #f48fb1; }
        .doll-wrapper.bg-jardim { background: linear-gradient(180deg, #c8e6c9 0%, #81c784 100%); border-color: #66bb6a; }
        .doll-wrapper.bg-praia { background: linear-gradient(180deg, #b3e5fc 0%, #fff9c4 100%); border-color: #4fc3f7; }
        .doll-wrapper.bg-palco { background: radial-gradient(ellipse at center top, #5c6bc0 0%, #1a237e 100%); border-color: #ffd700; }

        #doll { width: 220px; height: 440px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        .sparkle {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            animation: sparkleAnim 0.8s ease-out forwards;
            z-index: 5;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.8) rotate(180deg); opacity: 0; }
        }

        /* ====== SELETOR DE CENÁRIO ====== */
        .bg-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .bg-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 3px solid #ddd;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: #fff;
        }
        .bg-btn:hover { border-color: #ab47bc; transform: scale(1.15); }
        .bg-btn.active { border-color: #ab47bc; box-shadow: 0 0 10px rgba(171,71,188,0.5); }

        /* ====== CATEGORIAS LATERAIS ====== */
        .cat-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cat-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 3px solid #e8e0ec;
            border-radius: 14px;
            background: linear-gradient(135deg, #fff, #faf5fc);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
        }
        .cat-tab:hover { border-color: #ce93d8; }
        .cat-tab.active {
            border-color: #ab47bc;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            color: #4a148c;
            box-shadow: 0 3px 10px rgba(171,71,188,0.2);
        }
        .cat-tab .cat-icon { font-size: 1.5rem; flex-shrink: 0; }

        /* ====== OPÇÕES ====== */
        .options-panel {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px;
            min-height: 70px;
            background: rgba(255,255,255,0.6);
            border-radius: 14px;
            border: 2px solid #e8e0ec;
        }
        .opt-btn {
            width: 56px; height: 56px;
            border: 3px solid #e0e0e0;
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.2s;
            position: relative;
        }
        .opt-btn:hover { border-color: #ce93d8; transform: scale(1.08); }
        .opt-btn.active {
            border-color: #ab47bc;
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
            box-shadow: 0 3px 12px rgba(171,71,188,0.3);
            transform: scale(1.05);
        }
        .opt-btn .opt-check {
            position: absolute;
            top: -5px; right: -5px;
            background: #ab47bc;
            color: white;
            border-radius: 50%;
            width: 18px; height: 18px;
            font-size: 0.65rem;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .opt-btn.active .opt-check { display: flex; }

        /* ====== PALETA DE CORES ====== */
        .color-palette {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 14px;
            border: 2px solid #e8e0ec;
        }
        .color-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 3px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover { transform: scale(1.2); }
        .color-btn.active {
            border-color: #333;
            border-width: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
            transform: scale(1.1);
        }

        /* ====== BOTÃO FINALIZAR ====== */
        .btn-finish {
            padding: 12px 36px;
            font-size: 1.3rem;
            border: none;
            border-radius: 22px;
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(123,31,162,0.3);
        }
        .btn-finish:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(123,31,162,0.45); }

        /* ====== CELEBRAÇÃO ====== */
        .celebration-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.5s;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .celebration-content {
            background: linear-gradient(180deg, #fff3e0, #fce4ec);
            border-radius: 28px;
            padding: 36px;
            text-align: center;
            max-width: 380px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.5);
        }
        .celebration-content h2 {
            font-size: 2.2rem;
            color: #6a1b9a;
            margin-bottom: 16px;
            text-shadow: 1px 2px 4px rgba(171,71,188,0.15);
        }
        #final-doll svg { width: 200px; height: 400px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15)); }
        .confetti {
            position: fixed;
            width: 12px; height: 12px;
            pointer-events: none;
            animation: confettiFall 3s linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ====== RESPONSIVO ====== */
        @media (max-width: 900px) {
            #dress-screen { flex-direction: column; align-items: center; gap: 8px; }
            .side-panel { width: 100%; max-width: 420px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .cat-group { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .cat-tab { flex-direction: column; min-width: 56px; padding: 6px 8px; }
            .cat-tab .cat-label { font-size: 0.65rem; }
            .options-panel { max-width: 100%; }
            .color-palette { max-width: 100%; }
        }
        @media (max-width: 600px) {
            .doll-wrapper { width: 220px; height: 380px; }
            #doll { width: 180px; height: 380px; }
            .char-emoji { font-size: 4rem; }
            .opt-btn { width: 50px; height: 50px; font-size: 1.5rem; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>Vestir Boneco 👗</h1>
            <div class="stars-counter">
                <span class="star-icon">⭐</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div id="select-screen" class="select-screen">
                <h2>Escolha seu boneco! 🧸</h2>
                <div class="char-options">
                    <button class="char-btn" data-genero="menina">
                        <span class="char-emoji">👧</span>
                        <span>Menina</span>
                    </button>
                    <button class="char-btn" data-genero="menino">
                        <span class="char-emoji">👦</span>
                        <span>Menino</span>
                    </button>
                </div>
            </div>

            <div id="dress-screen" style="display:none;">
                <div class="side-panel" id="left-panel">
                    <div class="cat-group" id="left-cats"></div>
                    <div class="options-panel" id="left-options"></div>
                    <div class="color-palette" id="left-colors" style="display:none;"></div>
                </div>

                <div class="center-panel">
                    <div class="doll-wrapper" id="doll-wrapper">
                        <svg id="doll" viewBox="0 0 220 440" xmlns="http://www.w3.org/2000/svg"></svg>
                    </div>
                    <div class="bg-selector" id="bg-selector">
                        <button class="bg-btn active" data-bg="quarto" title="Quarto">🛏️</button>
                        <button class="bg-btn" data-bg="jardim" title="Jardim">🌸</button>
                        <button class="bg-btn" data-bg="praia" title="Praia">🏖️</button>
                        <button class="bg-btn" data-bg="palco" title="Palco">🎭</button>
                    </div>
                    <button class="btn-finish" id="btn-finish">Terminei! 🎉</button>
                </div>

                <div class="side-panel" id="right-panel">
                    <div class="cat-group" id="right-cats"></div>
                    <div class="options-panel" id="right-options"></div>
                    <div class="color-palette" id="right-colors" style="display:none;"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="celebration" class="celebration-overlay" style="display:none;">
        <div class="celebration-content">
            <h2 id="celeb-title">Que lindo! 🌟</h2>
            <div id="final-doll"></div>
            <button class="btn-finish" id="btn-restart">Brincar de novo 🔄</button>
        </div>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="tts.js"></script>
    <script src="admin.js"></script>
    <script src="vestir.js"></script>
</body>
</html>
