<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditado - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <div class="container">
        <header>
            <h1> Ditado de Palavras</h1>
            <p>Escute e escreva a palavra!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="word-area">
                <div class="spelling-emoji" id="spelling-emoji"></div>
                <div class="spelling-word" id="spelling-word"></div>
            </div>
            <div class="keyboard-area" id="keyboard-area"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button id="btn-hear" class="btn-speak"> Ouvir de novo</button>
                <button id="btn-clear" class="btn-clear"> Limpar</button>
                <button id="btn-check" class="btn-next"> Verificar</button>
            </div>
        </main>
        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
            <p>✝️ Herzog Developer</p>
        </footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="ditado.js"></script>
    <script src="admin.js"></script>
</body>
</html>
