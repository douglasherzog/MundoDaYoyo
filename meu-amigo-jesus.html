<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Amigo Jesus - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="meu-amigo-jesus.css">
</head>
<body class="game-page">
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="btn-back">Início</a>
            <h1>✝️ MEU AMIGO JESUS</h1>
            <p class="subtitle">A jornada de Jesus com a Yoyo</p>
        </header>

        <main class="game jesus-game">
            <!-- Progresso -->
            <div class="jesus-top">
                <div class="phase-badge" id="phase-badge">FASE 1</div>
                <div class="stars-line">⭐ <span id="stars-count">0</span></div>
            </div>

            <!-- Barra de progresso -->
            <div class="story-progress" id="story-progress">
                <span class="story-dot active" data-speak="Nascimento">⭐</span>
                <span class="story-dot" data-speak="Batismo">💧</span>
                <span class="story-dot" data-speak="Deserto">🪨</span>
                <span class="story-dot" data-speak="Pescadores">🎣</span>
                <span class="story-dot" data-speak="Monte">😊</span>
                <span class="story-dot" data-speak="Cura">👁️</span>
                <span class="story-dot" data-speak="Pães">🍞</span>
                <span class="story-dot" data-speak="Águas">🌊</span>
                <span class="story-dot" data-speak="Zaqueu">🌳</span>
                <span class="story-dot" data-speak="Jerusalém">🌿</span>
                <span class="story-dot" data-speak="Ceia">🍞</span>
                <span class="story-dot" data-speak="Amor">✝️</span>
                <span class="story-dot" data-speak="Ressurreição">🌅</span>
            </div>

            <!-- Cenário -->
            <div class="scene-card" id="scene-card">
                <div class="scene-background" id="scene-background"></div>
                <div class="scene-content" id="scene-content"></div>
            </div>

            <!-- Balão de fala -->
            <div class="speech-bubble" id="speech-bubble">
                Olá, Yoyo! Eu sou Jesus, seu amigo! ✨
            </div>

            <!-- Área da fase -->
            <div class="phase-area" id="phase-area">
                <div class="phase-emoji" id="phase-emoji">⭐</div>
                <div class="phase-title" id="phase-title">JESUS NASCE</div>
                <div class="phase-instruction" id="phase-instruction">Toque na estrela para guiar os Reis Magos!</div>
            </div>

            <!-- Botões -->
            <div class="phase-buttons" id="phase-buttons">
                <button class="big-action-btn" id="btn-next" data-speak="Próximo">
                    <span class="btn-emoji">▶️</span>
                    <span class="btn-text">PRÓXIMO</span>
                </button>
            </div>

            <!-- Medalhas -->
            <div class="jesus-medals" id="jesus-medals">
                <h3>🏆 MINHAS MEDALHAS</h3>
                <div class="medals-grid" id="medals-grid"></div>
            </div>
        </main>
    </div>

    <footer>
        <p>Feito com ❤️ para a Yoyo</p>
        <p>✝️ Herzog Developer</p>
    </footer>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="meu-amigo-jesus.js"></script>
</body>
</html>
