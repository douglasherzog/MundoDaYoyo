<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesmo ou Diferente - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🟰 Mesmo ou Diferente?</h1>
            <p>Olhe os desenhos e clique na resposta certa!</p>
        </header>

        <main class="game">
            <a href="index.html" class="btn-back">Início</a>
            <div class="score">⭐ Pontos: <span id="pontos">0</span></div>

            <div class="word-area">
                <div id="par-imagens" style="font-size: 4rem; display: flex; justify-content: center; align-items: center; gap: 40px; margin: 20px 0;"></div>
                <div class="animal-hint" id="pergunta">São iguais ou diferentes?</div>
            </div>

            <div class="animals" id="opcoes"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button class="btn-speak" id="btn-speak">🔊 Ouvir</button>
                <button class="btn-next" id="btn-next">Próxima 🚀</button>
            </div>
        </main>

        <footer>
            <p>Feito com ❤️ para a Yoyo</p>
        </footer>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="admin.js"></script>
    <script src="mesmo-diferente.js"></script>
    <script src="tts.js"></script>
</body>
</html>
