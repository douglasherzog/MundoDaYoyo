<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordem Alfabética - Mundo da Yoyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> Ordem Alfabética</h1>
            <p>Coloque as letras na ordem certa!</p>
        </header>
        <main class="game">
            <a href="index.html" class="btn-back"> Início</a>
            <div class="score"> Pontos: <span id="pontos">0</span></div>
            <div class="game-progress-container">
                <div class="game-progress-bar" id="progress-bar" style="width:0%">0 / 10</div>
            </div>
            <div class="word-area">
                <p>Coloque as letras em ordem alfabética:</p>
            </div>
            <div class="letters-pool" id="letters-pool"></div>
            <div class="answer-slots" id="answer-slots"></div>
            <div class="feedback" id="feedback"></div>
            <div class="controls">
                <button id="btn-clear" class="btn-clear"> Limpar</button>
                <button id="btn-check" class="btn-next"> Verificar</button>
            </div>
        </main>
        <footer><p>Feito com  para a Yoyo</p></footer>
    </div>
    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="tts.js"></script>
    <script src="ordem.js"></script>
    <script src="admin.js"></script>
</body>
</html>
