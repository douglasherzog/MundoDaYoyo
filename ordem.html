<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Ordem Alfabética</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="back-button">Início</a>
            <h1>Ordem Alfabética</h1>
            <div class="stars-counter">
                <span class="star-icon">⭐</span>
                <span id="stars-count">0</span>
            </div>
        </header>

        <main class="game-area">
            <div class="order-instruction">
                <p>Coloque as letras em ordem alfabética:</p>
            </div>

            <div id="letters-pool" class="letters-pool"></div>
            <div id="answer-slots" class="answer-slots"></div>

            <div id="feedback" class="feedback"></div>

            <div class="order-buttons">
                <button id="btn-clear" class="btn-clear">Limpar</button>
                <button id="btn-check" class="btn-check">Verificar</button>
                <button id="btn-next" class="btn-next" disabled>Próxima</button>
            </div>
        </main>
    </div>

    <script src="stars.js"></script>
    <script src="sounds.js"></script>
    <script src="ordem.js"></script>
    <script src="tts.js"></script>
    <script src="admin.js"></script>
</body>
</html>
