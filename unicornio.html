<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo da Yoyo - Meu Unicórnio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="unicornio.css">
</head>
<body>
    <div class="container">
        <header class="game-header">
            <a href="index.html" class="btn-back">Início</a>
            <h1>🦄 Meu Unicórnio</h1>
        </header>

        <main class="game unicornio-game">
            <!-- Info do pet -->
            <div class="pet-info">
                <div class="pet-name-area">
                    <span class="pet-name" id="pet-name">Estrelinha</span>
                    <button class="btn-rename" id="btn-rename" title="Renomear">✏️</button>
                </div>
                <div class="pet-level">
                    <span class="level-badge" id="level-badge">Nível 1</span>
                    <span class="pet-age" id="pet-age">1 dia</span>
                </div>
            </div>

            <!-- Barras de status -->
            <div class="status-bars">
                <div class="status-bar" data-speak="Comida">
                    <span class="status-icon">🍔</span>
                    <span class="status-label">COMIDA</span>
                    <div class="bar-bg"><div class="bar-fill bar-food" id="bar-food"></div></div>
                </div>
                <div class="status-bar" data-speak="Banho">
                    <span class="status-icon">🛁</span>
                    <span class="status-label">BANHO</span>
                    <div class="bar-bg"><div class="bar-fill bar-clean" id="bar-clean"></div></div>
                </div>
                <div class="status-bar" data-speak="Alegria">
                    <span class="status-icon">�</span>
                    <span class="status-label">ALEGRIA</span>
                    <div class="bar-bg"><div class="bar-fill bar-happy" id="bar-happy"></div></div>
                </div>
                <div class="status-bar" data-speak="Sono">
                    <span class="status-icon">💤</span>
                    <span class="status-label">SONO</span>
                    <div class="bar-bg"><div class="bar-fill bar-energy" id="bar-energy"></div></div>
                </div>
                <div class="status-bar" data-speak="Brilho">
                    <span class="status-icon">✨</span>
                    <span class="status-label">BRILHO</span>
                    <div class="bar-bg"><div class="bar-fill bar-sparkle" id="bar-sparkle"></div></div>
                </div>
                <div class="status-bar" data-speak="Saúde">
                    <span class="status-icon">❤️</span>
                    <span class="status-label">SAÚDE</span>
                    <div class="bar-bg"><div class="bar-fill bar-health" id="bar-health"></div></div>
                </div>
            </div>

            <!-- Área do unicórnio -->
            <div class="pet-scene" id="pet-scene">
                <div class="pet-mood" id="pet-mood"></div>
                <div class="unicorn-container" id="unicorn-container">
                    <div class="unicorn" id="unicorn">
                        <!-- Acessórios (nível alto) -->
                        <div class="unicorn-accessory" id="unicorn-accessory"></div>
                        <!-- Chifre -->
                        <div class="unicorn-horn" id="unicorn-horn"></div>
                        <!-- Orelhas -->
                        <div class="unicorn-ear left"></div>
                        <div class="unicorn-ear right"></div>
                        <!-- Crina -->
                        <div class="unicorn-mane" id="unicorn-mane">
                            <div class="mane-strand s1"></div>
                            <div class="mane-strand s2"></div>
                            <div class="mane-strand s3"></div>
                        </div>
                        <!-- Cabeça -->
                        <div class="unicorn-head" id="unicorn-head">
                            <!-- Olhos -->
                            <div class="unicorn-eyes" id="unicorn-eyes">
                                <div class="eye left"><div class="pupil"></div></div>
                                <div class="eye right"><div class="pupil"></div></div>
                            </div>
                            <!-- Bochecha (blush) -->
                            <div class="unicorn-blush left" id="blush-left"></div>
                            <div class="unicorn-blush right" id="blush-right"></div>
                            <!-- Boca -->
                            <div class="unicorn-mouth" id="unicorn-mouth"></div>
                            <!-- Focinho -->
                            <div class="unicorn-nose"></div>
                        </div>
                        <!-- Corpo -->
                        <div class="unicorn-body" id="unicorn-body">
                            <!-- Asas (nível alto) -->
                            <div class="unicorn-wing left" id="wing-left"></div>
                            <div class="unicorn-wing right" id="wing-right"></div>
                            <!-- Patas -->
                            <div class="unicorn-legs">
                                <div class="leg fl"></div>
                                <div class="leg fr"></div>
                                <div class="leg bl"></div>
                                <div class="leg br"></div>
                            </div>
                            <!-- Cauda -->
                            <div class="unicorn-tail" id="unicorn-tail">
                                <div class="tail-strand t1"></div>
                                <div class="tail-strand t2"></div>
                                <div class="tail-strand t3"></div>
                            </div>
                        </div>
                        <!-- Indicadores visuais de estado -->
                        <div class="state-indicators" id="state-indicators"></div>
                    </div>
                </div>
                <div class="scene-items" id="scene-items"></div>
                <!-- Cenário de fundo dinâmico -->
                <div class="scene-bg" id="scene-bg">
                    <div class="sky-objects" id="sky-objects"></div>
                    <div class="weather-effects" id="weather-effects"></div>
                    <div class="ground-decor" id="ground-decor"></div>
                </div>
            </div>

            <!-- Mensagem do unicórnio -->
            <div class="pet-message" id="pet-message">Olá! Eu sou a Estrelinha! Cuide de mim!</div>

            <!-- Botões de ação -->
            <div class="action-buttons" id="action-buttons">
                <button class="action-btn food-btn" id="btn-cafe" data-action="cafe">
                    <span class="action-emoji">☀️</span>
                    <span class="action-text">CAFÉ</span>
                </button>
                <button class="action-btn food-btn" id="btn-almoco" data-action="almoco">
                    <span class="action-emoji">�</span>
                    <span class="action-text">ALMOÇO</span>
                </button>
                <button class="action-btn food-btn" id="btn-janta" data-action="janta">
                    <span class="action-emoji">🌙</span>
                    <span class="action-text">JANTA</span>
                </button>
                <button class="action-btn care-btn" id="btn-banho" data-action="banho">
                    <span class="action-emoji">🛁</span>
                    <span class="action-text">BANHO</span>
                </button>
                <button class="action-btn care-btn" id="btn-dentes" data-action="dentes">
                    <span class="action-emoji">🪥</span>
                    <span class="action-text">DENTES</span>
                </button>
                <button class="action-btn play-btn" id="btn-brincar" data-action="brincar">
                    <span class="action-emoji">⚽</span>
                    <span class="action-text">BRINCAR</span>
                </button>
                <button class="action-btn love-btn" id="btn-carinho" data-action="carinho">
                    <span class="action-emoji">�</span>
                    <span class="action-text">CARINHO</span>
                </button>
                <button class="action-btn sleep-btn" id="btn-dormir" data-action="dormir">
                    <span class="action-emoji">😴</span>
                    <span class="action-text">DORMIR</span>
                </button>
                <button class="action-btn health-btn" id="btn-remedio" data-action="remedio" style="display:none">
                    <span class="action-emoji">💊</span>
                    <span class="action-text">REMÉDIO</span>
                </button>
            </div>

            <!-- Diário visual -->
            <div class="care-diary" id="care-diary">
                <h3>📋 O QUE EU FIZ HOJE</h3>
                <div class="diary-tasks" id="diary-tasks"></div>
            </div>

            <!-- Estrelas do dia -->
            <div class="daily-stars" id="daily-stars">
                <span class="stars-title">⭐ MINHAS ESTRELAS ⭐</span>
                <span class="stars-display" id="stars-display"></span>
            </div>

            <!-- Conquistas -->
            <div class="achievements-section" id="achievements-section">
                <h3>🏆 MINHAS MEDALHAS</h3>
                <div class="achievements-grid" id="achievements-grid"></div>
            </div>
        </main>
    </div>

    <script src="tts.js"></script>
    <script src="sounds.js"></script>
    <script src="yoyo-mascot.js"></script>
    <script src="transitions.js"></script>
    <script src="achievements.js"></script>
    <script src="game-engine.js"></script>
    <script src="unicornio.js"></script>
    <script src="admin.js"></script>
</body>
</html>
